<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteor Shield</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
  }
  #autoplayBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 20;
    padding: 10px 18px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #0ff4;
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  #autoplayBtn:hover { border-color: #0ff; background: rgba(0,255,255,0.1); }
  #autoplayBtn.active {
    border-color: #0ff;
    color: #000;
    background: #0ff;
    animation: pulse-btn 1s infinite;
  }
  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 0 8px #0ff; }
    50% { box-shadow: 0 0 22px #0ff, 0 0 40px #0ff4; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="autoplayBtn">⚡ AUTOPLAY OFF</button>

<script>
// ============================================================
//  METEOR SHIELD — Complete Game
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const autoplayBtn = document.getElementById('autoplayBtn');

// ── Resize ──────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  gs.cx = canvas.width  / 2;
  gs.cy = canvas.height / 2;
}
window.addEventListener('resize', resize);

// ── Level Configs ────────────────────────────────────────────
function getLevelConfig(lvl) {
  if (lvl <= 8) {
    const configs = [
      { meteors:3,  speed:1.2, spawnInterval:3000, arcDeg:100, split:false, sizes:false, curve:false, burst:false },
      { meteors:5,  speed:1.5, spawnInterval:2500, arcDeg:100, split:false, sizes:false, curve:false, burst:false },
      { meteors:7,  speed:1.8, spawnInterval:2200, arcDeg:90,  split:false, sizes:false, curve:false, burst:false },
      { meteors:10, speed:2.0, spawnInterval:2000, arcDeg:90,  split:true,  sizes:false, curve:false, burst:false },
      { meteors:12, speed:2.3, spawnInterval:1800, arcDeg:80,  split:true,  sizes:true,  curve:false, burst:false },
      { meteors:15, speed:2.6, spawnInterval:1600, arcDeg:80,  split:true,  sizes:true,  curve:true,  burst:false },
      { meteors:18, speed:3.0, spawnInterval:1400, arcDeg:75,  split:true,  sizes:true,  curve:true,  burst:true  },
      { meteors:21, speed:3.4, spawnInterval:1200, arcDeg:70,  split:true,  sizes:true,  curve:true,  burst:true  },
    ];
    return configs[lvl - 1];
  }
  // Level 8+: escalate
  const extra = lvl - 8;
  return {
    meteors: 21 + extra * 3,
    speed:   3.4 * Math.pow(1.1, extra),
    spawnInterval: Math.max(600, 1200 - extra * 60),
    arcDeg: 70,
    split: true, sizes: true, curve: true, burst: true
  };
}

// ── Game State ───────────────────────────────────────────────
const gs = {
  cx: 0, cy: 0,
  phase: 'playing', // 'playing' | 'levelComplete' | 'gameover' | 'win'
  level: 1,
  score: 0,
  planetHealth: 100,
  shieldAngle: 0,       // radians, angle of shield center
  targetShieldAngle: 0,
  meteors: [],
  particles: [],
  stars: [],
  twinkleStars: [],
  spawnTimer: 0,
  spawnCount: 0,
  levelConfig: null,
  transitionTimer: 0,
  shieldPulse: 0,
  screenShake: { x:0, y:0, dur:0 },
  screenFlash: 0,
  perfectLevel: true,
  autoplay: false,
  // Autoplay state
  ai: {
    targetAngle: 0,
    reactionTimer: 0,   // delay before reacting
    pendingTarget: 0,
    angleError: 0,
  },
  planetRadius: 55,
  shieldOrbit: 95,      // distance from center to shield arc
  frameTime: 0,
};

// ── Stars ─────────────────────────────────────────────────────
function initStars() {
  gs.stars = [];
  gs.twinkleStars = [];
  for (let i = 0; i < 160; i++) {
    gs.stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.7 + 0.3,
    });
  }
  for (let i = 0; i < 20; i++) {
    gs.twinkleStars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.5,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 2 + 1,
    });
  }
}

// ── Init Level ───────────────────────────────────────────────
function initLevel(lvl) {
  gs.level       = lvl;
  gs.levelConfig = getLevelConfig(lvl);
  gs.meteors     = [];
  gs.particles   = [];
  gs.spawnTimer  = 0;
  gs.spawnCount  = 0;
  gs.perfectLevel = true;
  gs.phase       = 'playing';
}

function initGame() {
  gs.score         = 0;
  gs.planetHealth  = 100;
  gs.shieldAngle   = 0;
  gs.targetShieldAngle = 0;
  gs.screenFlash   = 0;
  gs.screenShake   = { x:0, y:0, dur:0 };
  gs.ai            = { targetAngle:0, reactionTimer:0, pendingTarget:0, angleError:0 };
  initLevel(1);
}

// ── Spawn Meteor ─────────────────────────────────────────────
function spawnMeteor(cfg, small, fromAngle) {
  const angle = (fromAngle !== undefined) ? fromAngle : Math.random() * Math.PI * 2;
  const dist  = Math.max(canvas.width, canvas.height) * 0.75;
  const sx    = gs.cx + Math.cos(angle) * dist;
  const sy    = gs.cy + Math.sin(angle) * dist;

  // Direction toward planet center with slight offset
  const dx = gs.cx - sx;
  const dy = gs.cy - sy;
  const len = Math.hypot(dx, dy);

  let spd = cfg.speed;
  let radius = 11;
  if (cfg.sizes) {
    if (small) { spd *= 1.5; radius = 7; }
    else        { spd *= 0.7; radius = 16; }
  }
  if (small) { spd *= 1.2; radius = 7; }

  const curveMag = (cfg.curve && Math.random() < 0.35) ? (Math.random() - 0.5) * 0.004 : 0;

  gs.meteors.push({
    x: sx, y: sy,
    vx: (dx / len) * spd,
    vy: (dy / len) * spd,
    radius,
    curvature: curveMag, // perpendicular rotation per frame
    angle: angle + Math.PI, // incoming angle (for curvature perp axis)
    trail: [],
    hp: 1,
    active: true,
    size: small ? 'small' : 'normal',
    canSplit: cfg.split && !small && radius > 9,
  });
}

function spawnWave(burst) {
  const cfg = gs.levelConfig;
  if (burst && cfg.burst && Math.random() < 0.25) {
    const a = Math.random() * Math.PI * 2;
    for (let i = 0; i < 3; i++) {
      spawnMeteor(cfg, false, a + (i - 1) * 0.12);
    }
    gs.spawnCount += 3;
  } else {
    spawnMeteor(cfg, cfg.sizes && Math.random() < 0.4);
    gs.spawnCount++;
  }
}

// ── Angle Utilities ───────────────────────────────────────────
function angleDiff(a, b) {
  let d = b - a;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

function lerpAngle(a, b, t) {
  return a + angleDiff(a, b) * t;
}

// ── Shield Arc check ─────────────────────────────────────────
function meteorHitsShield(m) {
  const cfg = gs.levelConfig;
  const arcRad = (cfg.arcDeg / 2) * (Math.PI / 180);
  const shieldR = gs.shieldOrbit;

  // Vector from planet center to meteor
  const dx = m.x - gs.cx;
  const dy = m.y - gs.cy;
  const distToCenter = Math.hypot(dx, dy);

  // Only check when meteor is near shield orbit distance
  const tolerance = m.radius + 6;
  if (Math.abs(distToCenter - shieldR) > tolerance) return false;

  // Angle of meteor from center
  const meteorAngle = Math.atan2(dy, dx);
  const diff = Math.abs(angleDiff(gs.shieldAngle, meteorAngle));
  return diff <= arcRad;
}

// ── Collision: planet ─────────────────────────────────────────
function meteorHitsPlanet(m) {
  const dist = Math.hypot(m.x - gs.cx, m.y - gs.cy);
  return dist < gs.planetRadius + m.radius - 4;
}

// ── Particles ─────────────────────────────────────────────────
function spawnSparks(x, y, count, color, fast) {
  for (let i = 0; i < count; i++) {
    const spd = (fast ? 3 : 1.5) + Math.random() * (fast ? 5 : 3);
    const ang = Math.random() * Math.PI * 2;
    gs.particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 0.8 + Math.random() * 0.6,
      maxLife: 0,
      color,
      radius: Math.random() * 3 + 1,
    });
    gs.particles[gs.particles.length - 1].maxLife = gs.particles[gs.particles.length - 1].life;
  }
}

// ── AUTOPLAY AI ───────────────────────────────────────────────
// The AI picks the most threatening meteor (closest to planet),
// computes the angle it will cross the shield orbit, then
// smoothly rotates toward it — with reaction delay and angle jitter.
function updateAutoplay(dt) {
  const ai = gs.ai;

  // Find most threatening meteor: smallest distance to planet center
  let bestThreat = null;
  let bestDist   = Infinity;

  for (const m of gs.meteors) {
    if (!m.active) continue;
    const dist = Math.hypot(m.x - gs.cx, m.y - gs.cy);
    if (dist < bestDist) {
      bestDist   = dist;
      bestThreat = m;
    }
  }

  if (bestThreat) {
    // Angle of that meteor from planet center
    const rawAngle = Math.atan2(bestThreat.y - gs.cy, bestThreat.x - gs.cx);

    // Reaction delay: only update pending target when timer expires
    ai.reactionTimer -= dt * 1000;
    if (ai.reactionTimer <= 0) {
      ai.reactionTimer  = 150; // 150 ms reaction delay
      ai.pendingTarget  = rawAngle;
      // Add small random angle error ±5 degrees
      ai.angleError     = (Math.random() - 0.5) * (10 * Math.PI / 180);
    }

    ai.targetAngle = ai.pendingTarget + ai.angleError;
  }

  // Smoothly rotate shield toward AI target (a bit slower than instant)
  const diff = angleDiff(gs.shieldAngle, ai.targetAngle);
  const step = Math.min(Math.abs(diff), 4.5 * dt);
  gs.shieldAngle += Math.sign(diff) * step;
}

// ── Input ─────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  if (gs.autoplay) return;
  const dx = e.clientX - gs.cx;
  const dy = e.clientY - gs.cy;
  gs.targetShieldAngle = Math.atan2(dy, dx);
});

canvas.addEventListener('click', e => {
  if (gs.phase === 'gameover') {
    initGame();
  }
});

autoplayBtn.addEventListener('click', () => {
  gs.autoplay = !gs.autoplay;
  if (gs.autoplay) {
    autoplayBtn.textContent = '⚡ AUTOPLAY ON';
    autoplayBtn.classList.add('active');
  } else {
    autoplayBtn.textContent = '⚡ AUTOPLAY OFF';
    autoplayBtn.classList.remove('active');
  }
});

// ── UPDATE ─────────────────────────────────────────────────────
function update(dt) {
  // Clamp dt to avoid spiral-of-death
  dt = Math.min(dt, 0.05);

  const cfg = gs.levelConfig;
  gs.shieldPulse += dt * 3;

  // Screen shake decay
  if (gs.screenShake.dur > 0) {
    gs.screenShake.dur -= dt;
    gs.screenShake.x = (Math.random() - 0.5) * 10 * gs.screenShake.dur;
    gs.screenShake.y = (Math.random() - 0.5) * 10 * gs.screenShake.dur;
  } else {
    gs.screenShake.x = 0; gs.screenShake.y = 0;
  }
  gs.screenFlash = Math.max(0, gs.screenFlash - dt * 3);

  if (gs.phase === 'levelComplete') {
    gs.transitionTimer -= dt;
    if (gs.transitionTimer <= 0) {
      initLevel(gs.level + 1);
    }
    return;
  }

  if (gs.phase === 'gameover' || gs.phase === 'win') return;

  // ── Shield rotation ──
  if (gs.autoplay) {
    updateAutoplay(dt);
  } else {
    // Arrow key control
    if (keys['ArrowLeft']  || keys['a']) gs.targetShieldAngle -= 3.5 * dt;
    if (keys['ArrowRight'] || keys['d']) gs.targetShieldAngle += 3.5 * dt;
    // Smooth to mouse/key target
    const diff2 = angleDiff(gs.shieldAngle, gs.targetShieldAngle);
    gs.shieldAngle += diff2 * Math.min(1, 12 * dt);
  }

  // ── Spawning ──
  gs.spawnTimer -= dt * 1000;
  if (gs.spawnTimer <= 0 && gs.spawnCount < cfg.meteors) {
    gs.spawnTimer = cfg.spawnInterval;
    spawnWave(true);
  }

  // ── Update Meteors ──
  for (const m of gs.meteors) {
    if (!m.active) continue;

    // Record trail
    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 12) m.trail.shift();

    // Curvature: rotate velocity vector slightly
    if (m.curvature !== 0) {
      const spd = Math.hypot(m.vx, m.vy);
      const vAngle = Math.atan2(m.vy, m.vx) + m.curvature;
      m.vx = Math.cos(vAngle) * spd;
      m.vy = Math.sin(vAngle) * spd;
    }

    m.x += m.vx * dt * 60;
    m.y += m.vy * dt * 60;

    // Check shield collision
    if (meteorHitsShield(m)) {
      // Spawn sparks
      spawnSparks(m.x, m.y, 18, '#0ff', true);
      spawnSparks(m.x, m.y, 10, '#fff', false);
      gs.score += 10;

      // Split mechanic
      if (m.canSplit) {
        for (let s = 0; s < 2; s++) {
          const perpAngle = Math.atan2(m.vy, m.vx) + (s === 0 ? 0.5 : -0.5);
          const spd2 = Math.hypot(m.vx, m.vy) * 1.3;
          gs.meteors.push({
            x: m.x, y: m.y,
            vx: Math.cos(perpAngle) * spd2,
            vy: Math.sin(perpAngle) * spd2,
            radius: 6,
            curvature: 0,
            trail: [],
            hp: 1,
            active: true,
            size: 'small',
            canSplit: false,
          });
          gs.spawnCount--; // so level doesn't end early
        }
      }

      m.active = false;
      continue;
    }

    // Check planet collision
    if (meteorHitsPlanet(m)) {
      m.active = false;
      gs.planetHealth -= m.size === 'small' ? 8 : 15;
      gs.perfectLevel  = false;
      gs.screenFlash   = 1;
      gs.screenShake   = { x:0, y:0, dur: 0.4 };
      spawnSparks(m.x, m.y, 20, '#f44', false);
      if (gs.planetHealth <= 0) {
        gs.planetHealth = 0;
        gs.phase = 'gameover';
      }
    }
  }

  // Remove inactive meteors
  gs.meteors = gs.meteors.filter(m => m.active);

  // ── Particles ──
  for (const p of gs.particles) {
    p.x    += p.vx * dt * 60;
    p.y    += p.vy * dt * 60;
    p.vx   *= 0.93;
    p.vy   *= 0.93;
    p.life -= dt;
  }
  gs.particles = gs.particles.filter(p => p.life > 0);

  // ── Level Complete Check ──
  if (gs.spawnCount >= cfg.meteors && gs.meteors.length === 0 && gs.phase === 'playing') {
    // Bonus scoring
    if (gs.perfectLevel) gs.score += 50;
    gs.transitionTimer = 2.5;

    if (gs.level >= 8) {
      gs.phase = 'levelComplete'; // keep going after 8
    } else {
      gs.phase = 'levelComplete';
    }
  }
}

// ── DRAW ───────────────────────────────────────────────────────
function draw(t) {
  const W = canvas.width, H = canvas.height;
  const cx = gs.cx + gs.screenShake.x;
  const cy = gs.cy + gs.screenShake.y;

  // Clear
  ctx.fillStyle = '#030610';
  ctx.fillRect(0, 0, W, H);

  // ── Stars ──
  for (const s of gs.stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  // Twinkling stars
  for (const s of gs.twinkleStars) {
    const alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * 0.001 * s.speed + s.phase));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#adf';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Planet glow ──
  const glowR = gs.planetRadius * 2.5;
  const glow  = ctx.createRadialGradient(cx, cy, gs.planetRadius * 0.5, cx, cy, glowR);
  glow.addColorStop(0, 'rgba(40,180,120,0.25)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
  ctx.fill();

  // ── Planet ──
  const planetGrad = ctx.createRadialGradient(cx - 15, cy - 15, 4, cx, cy, gs.planetRadius);
  planetGrad.addColorStop(0, '#7ff5c0');
  planetGrad.addColorStop(0.35, '#2aa87a');
  planetGrad.addColorStop(0.7, '#1a6a88');
  planetGrad.addColorStop(1, '#0a1a44');
  ctx.fillStyle = planetGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, gs.planetRadius, 0, Math.PI * 2);
  ctx.fill();

  // Planet surface details
  ctx.save();
  ctx.clip();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#4ee5a0';
  ctx.beginPath();
  ctx.ellipse(cx - 10, cy - 8, 22, 12, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 14, cy + 10, 12, 7, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Planet border
  ctx.strokeStyle = 'rgba(120,255,200,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, gs.planetRadius, 0, Math.PI * 2);
  ctx.stroke();

  // ── Meteors ──
  for (const m of gs.meteors) {
    if (!m.active) continue;

    // Trail
    if (m.trail.length > 1) {
      for (let i = 1; i < m.trail.length; i++) {
        const pct  = i / m.trail.length;
        const ox   = m.trail[i].x - gs.cx + cx;
        const oy   = m.trail[i].y - gs.cy + cy;
        const ox2  = m.trail[i-1].x - gs.cx + cx;
        const oy2  = m.trail[i-1].y - gs.cy + cy;
        ctx.globalAlpha = pct * 0.6;
        ctx.strokeStyle = `hsl(${30 + pct * 20}, 100%, ${50 + pct * 20}%)`;
        ctx.lineWidth = m.radius * pct * 0.9;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(ox2, oy2);
        ctx.lineTo(ox, oy);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // Meteor body
    const mx = m.x - gs.cx + cx;
    const my = m.y - gs.cy + cy;
    const mGrad = ctx.createRadialGradient(mx, my, 0, mx, my, m.radius);
    mGrad.addColorStop(0, '#ffe090');
    mGrad.addColorStop(0.4, '#ff6020');
    mGrad.addColorStop(1, '#8b1500');
    ctx.fillStyle = mGrad;
    ctx.beginPath();
    ctx.arc(mx, my, m.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Shield ──
  const cfg = gs.levelConfig;
  if (cfg && gs.phase === 'playing') {
    const arcRad  = (cfg.arcDeg / 2) * (Math.PI / 180);
    const shieldR = gs.shieldOrbit;
    const pulse   = 0.7 + 0.3 * Math.sin(gs.shieldPulse);
    const startA  = gs.shieldAngle - arcRad;
    const endA    = gs.shieldAngle + arcRad;

    // Outer glow
    ctx.save();
    ctx.globalAlpha = 0.25 * pulse;
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth   = 18;
    ctx.lineCap     = 'round';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur  = 24;
    ctx.beginPath();
    ctx.arc(cx, cy, shieldR, startA, endA);
    ctx.stroke();
    ctx.restore();

    // Inner shield arc
    ctx.save();
    ctx.globalAlpha = 0.85 + 0.15 * pulse;
    ctx.strokeStyle = '#00efff';
    ctx.lineWidth   = 5;
    ctx.lineCap     = 'round';
    ctx.shadowColor = '#00efff';
    ctx.shadowBlur  = 16;
    ctx.beginPath();
    ctx.arc(cx, cy, shieldR, startA, endA);
    ctx.stroke();
    ctx.restore();

    // Bright core
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.5 * pulse;
    ctx.strokeStyle = '#e0ffff';
    ctx.lineWidth   = 2;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(cx, cy, shieldR, startA, endA);
    ctx.stroke();
    ctx.restore();
  }

  // ── Particles ──
  for (const p of gs.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 6;
    ctx.beginPath();
    ctx.arc(p.x - gs.cx + cx, p.y - gs.cy + cy, p.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;

  // ── Screen Flash ──
  if (gs.screenFlash > 0) {
    ctx.fillStyle = `rgba(255,50,50,${gs.screenFlash * 0.35})`;
    ctx.fillRect(0, 0, W, H);
  }

  // ── HUD ──
  drawHUD(W, H, t);

  // ── Overlays ──
  if (gs.phase === 'levelComplete') drawLevelComplete(W, H);
  if (gs.phase === 'gameover')      drawGameOver(W, H);
}

function drawHUD(W, H, t) {
  // Level
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(16, 16, 160, 36);
  ctx.fillStyle = '#0cf';
  ctx.font = 'bold 14px Courier New';
  ctx.fillText(`LEVEL  ${gs.level}`, 26, 38);

  // Score
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W - 176, 16, 160, 36);
  ctx.fillStyle = '#ffe066';
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE  ${gs.score}`, W - 26, 38);
  ctx.textAlign = 'left';

  // Health bar
  const barW = 200, barH = 14;
  const bx   = W / 2 - barW / 2;
  const by   = 20;
  const hPct = gs.planetHealth / 100;
  const hColor = hPct > 0.5 ? `hsl(${120 * hPct},100%,50%)` : `hsl(${120 * hPct},100%,50%)`;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#111';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = hColor;
  ctx.shadowColor = hColor;
  ctx.shadowBlur  = 10;
  ctx.fillRect(bx, by, barW * hPct, barH);
  ctx.shadowBlur  = 0;

  // Label
  ctx.fillStyle = '#aaa';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('PLANET HEALTH', W / 2, by + barH + 14);
  ctx.textAlign = 'left';

  // Wave progress
  const waved = gs.spawnCount;
  const total = gs.levelConfig ? gs.levelConfig.meteors : 0;
  ctx.fillStyle = '#555';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE  ${Math.min(waved, total)} / ${total}`, W / 2, by - 6);
  ctx.textAlign = 'left';

  // Autoplay indicator
  if (gs.autoplay) {
    const alpha2 = 0.6 + 0.4 * Math.sin(t * 0.005);
    ctx.globalAlpha = alpha2;
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 11px Courier New';
    ctx.fillText('● AI ACTIVE', 26, H - 58);
    ctx.globalAlpha = 1;
  }
}

function drawLevelComplete(W, H) {
  ctx.fillStyle = 'rgba(0,5,20,0.75)';
  ctx.fillRect(0, 0, W, H);

  const finished = gs.level > 8;
  const bx = W / 2, by = H / 2;

  // Panel
  ctx.fillStyle = 'rgba(0,20,50,0.9)';
  roundRect(ctx, bx - 240, by - 100, 480, 200, 16);
  ctx.fill();
  ctx.strokeStyle = '#0cf';
  ctx.lineWidth = 2;
  roundRect(ctx, bx - 240, by - 100, 480, 200, 16);
  ctx.stroke();

  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 28px Courier New';
  ctx.textAlign = 'center';

  if (gs.perfectLevel) {
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 13px Courier New';
    ctx.fillText('✦ PERFECT DEFENSE! +50 BONUS', bx, by - 60);
  } else {
    ctx.fillStyle = '#0cf';
    ctx.font = 'bold 22px Courier New';
    ctx.fillText(`LEVEL ${gs.level} COMPLETE!`, bx, by - 60);
  }

  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 22px Courier New';
  ctx.fillText(`LEVEL ${gs.level} COMPLETE!`, bx, by - 32);

  if (finished) {
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 16px Courier New';
    ctx.fillText('★  LEGENDARY DEFENDER  ★', bx, by + 2);
    ctx.fillStyle = '#aaf';
    ctx.font = '13px Courier New';
    ctx.fillText('Enemies keep coming… how long can you hold?', bx, by + 26);
  } else {
    ctx.fillStyle = '#aaf';
    ctx.font = '14px Courier New';
    ctx.fillText(`Next wave incoming…`, bx, by + 10);
  }

  const secs = Math.max(0, gs.transitionTimer).toFixed(1);
  ctx.fillStyle = '#0cf';
  ctx.font = '13px Courier New';
  ctx.fillText(`Starting in ${secs}s`, bx, by + 70);
  ctx.textAlign = 'left';
}

function drawGameOver(W, H) {
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  const bx = W / 2, by = H / 2;

  ctx.fillStyle = 'rgba(30,0,0,0.9)';
  roundRect(ctx, bx - 240, by - 120, 480, 240, 16);
  ctx.fill();
  ctx.strokeStyle = '#f44';
  ctx.lineWidth = 2;
  roundRect(ctx, bx - 240, by - 120, 480, 240, 16);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f55';
  ctx.font = 'bold 34px Courier New';
  ctx.fillText('PLANET DESTROYED', bx, by - 68);

  ctx.fillStyle = '#aaa';
  ctx.font = '15px Courier New';
  ctx.fillText(`Level Reached: ${gs.level}`, bx, by - 28);
  ctx.fillText(`Final Score:   ${gs.score}`, bx, by + 2);

  // Play Again button
  const btnX = bx - 100, btnY = by + 50, btnW = 200, btnH = 44;
  ctx.fillStyle = '#f44';
  roundRect(ctx, btnX, btnY, btnW, btnH, 10);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Courier New';
  ctx.fillText('▶  PLAY AGAIN', bx, btnY + 28);

  ctx.textAlign = 'left';

  // Hit area
  canvas.onclick = (e) => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
      canvas.onclick = null;
      initGame();
    }
  };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── GAME LOOP ─────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  gs.frameTime = ts;

  update(dt);
  draw(ts);

  requestAnimationFrame(loop);
}

// ── BOOT ─────────────────────────────────────────────────────
resize();
initStars();
initGame();
requestAnimationFrame(loop);
</script>
</body>
